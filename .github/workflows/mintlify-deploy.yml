name: Deploy Mintlify to GitHub Pages

on:
  push:
    branches:
      - main # Or 'master' if your main branch is called master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mintlify CLI and Export
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true npm install -g mint
          mint export

      - name: Unzip and Fix Subfolder Pathing
        run: |
          unzip export.zip -d out_temp
          mkdir out
          cp -r out_temp/* out/ || true
          
          # 1. CRITICAL: Create the .nojekyll file so GitHub stops blocking the _next folder
          touch out/.nojekyll
          
          # 2. Update resource links in all HTML files to account for the /TuLIP-docs subfolder
          find out -name "*.html" -exec sed -i 's|href="/_next/|href="/TuLIP-docs/_next/|g' {} +
          find out -name "*.html" -exec sed -i 's|src="/_next/|src="/TuLIP-docs/_next/|g' {} +
          find out -name "*.html" -exec sed -i 's|href="/assets/|href="/TuLIP-docs/assets/|g' {} +
          find out -name "*.html" -exec sed -i 's|src="/assets/|src="/TuLIP-docs/assets/|g' {} +

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
